# Add this section to your project's _bmad/bmm/config.yaml to enable Atlassian sync.
# Credentials are resolved from .env via ${VAR} syntax — never hardcode secrets here.

atlassian_sync:
  enabled: true
  jira_base_url: "https://your-domain.atlassian.net"
  jira_project_key: "PROJ"
  jira_email: "${JIRA_EMAIL}"
  jira_api_token: "${JIRA_API_TOKEN}"
  jira_board_id: 1
  confluence_base_url: "https://your-domain.atlassian.net/wiki"
  confluence_space_key: "PROJ"
