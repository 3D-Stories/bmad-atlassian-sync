# ATS Module Configuration
# Atlassian Sync for BMAD
# Generated by bmad-atlassian-sync installer
# Version: 0.1.0

# Atlassian Sync Settings
# Set enabled: true and fill in your Atlassian details to activate sync.
# Credentials should be in .env — never hardcode secrets here.
atlassian_sync:
  enabled: false
  jira_base_url: ""
  jira_project_key: ""
  jira_email: "${ATLASSIAN_SA_EMAIL}"
  jira_api_token: "${ATLASSIAN_API_TOKEN}"
  jira_board_id: 1
  confluence_base_url: ""
  confluence_space_key: ""

# Sync behavior
sync:
  conflict_strategy: merge  # merge | local-wins | remote-wins | ask
  auto_label: bmad-sync     # Label applied to all synced Jira issues

# CLI location (resolved by installer)
cli_path: "{project-root}/_bmad/ats/cli"

# Core Configuration Values (populated by bmad-init)
user_name: ""
communication_language: English
document_output_language: English
output_folder: "{project-root}/_bmad-output"
